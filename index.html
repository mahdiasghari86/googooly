<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="گرفتن توپ">
  <meta name="theme-color" content="#a855f7">
  <title>گرفتن توپ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #4a2080 100%);
      font-family: Tahoma, Arial, sans-serif;
      color: #e9d5ff;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
      transition: background 0.6s ease;
    }

    h1 {
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
      color: #c084fc;
      transition: color 0.6s ease;
    }

    .info {
      margin-bottom: 1rem;
      font-size: 1rem;
      color: #a78bfa;
      transition: color 0.6s ease;
    }

    .score {
      margin-bottom: 0.75rem;
      font-size: 1.2rem;
      color: #ddd6fe;
    }

    .score span {
      color: #e879f9;
      font-weight: bold;
      transition: color 0.6s ease;
    }

    canvas {
      border: 3px solid #a855f7;
      border-radius: 8px;
      background: #0d1b2a;
      cursor: none;
      box-shadow: 0 8px 32px rgba(168, 85, 247, 0.4);
      transition: border-color 0.6s ease, box-shadow 0.6s ease;
      max-width: 95vw;
      height: auto;
      touch-action: none;
      -ms-touch-action: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .hint {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #7c3aed;
      transition: color 0.6s ease;
    }
  </style>
</head>
<body>
  <h1 id="title">🎮 گرفتن توپ</h1>
  <p class="info" id="info">توپ‌های قرمز را با سبد بگیر!</p>
  <p class="score">امتیاز: <span id="score">0</span> | توپ‌ها: <span id="ballCount">1</span>/<span id="ballMax">3</span></p>
  <canvas id="game" width="400" height="500"></canvas>
  <p class="hint" id="hint">← → یا A D برای حرکت | کلیک، Space یا Enter برای شروع دوباره</p>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const ballCountEl = document.getElementById('ballCount');
    const titleEl = document.getElementById('title');
    const infoEl = document.getElementById('info');
    const hintEl = document.getElementById('hint');

    const W = canvas.width;
    const H = canvas.height;
    const MAX_BALLS = 3;
    const POINTS_PER_BALL = 7;
    const MIN_ARRIVAL_GAP_MS = 1500;
    const BALL_LANES = Array.from({ length: MAX_BALLS }, (_, i) =>
      W * ((i + 1) / (MAX_BALLS + 1))
    );
    const BASE_PADDLE_W = 80;

    const themes = [
      {
        body: 'linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #4a2080 100%)',
        title: '#c084fc',
        info: '#a78bfa',
        scoreAccent: '#e879f9',
        hint: '#7c3aed',
        canvasBorder: '#a855f7',
        canvasBg: '#0d1b2a',
        canvasShadow: 'rgba(168, 85, 247, 0.4)',
        paddle: '#4cc9f0',
        ball: '#e94560',
        overlay: '#c084fc'
      },
      {
        body: 'linear-gradient(135deg, #0a2e1a 0%, #1b4e2d 50%, #20804a 100%)',
        title: '#4ade80',
        info: '#86efac',
        scoreAccent: '#22d3ee',
        hint: '#059669',
        canvasBorder: '#10b981',
        canvasBg: '#0a1f14',
        canvasShadow: 'rgba(16, 185, 129, 0.4)',
        paddle: '#fbbf24',
        ball: '#f97316',
        overlay: '#4ade80'
      },
      {
        body: 'linear-gradient(135deg, #2e0a0a 0%, #4e1b1b 50%, #802020 100%)',
        title: '#fca5a5',
        info: '#fdba74',
        scoreAccent: '#fde047',
        hint: '#dc2626',
        canvasBorder: '#ef4444',
        canvasBg: '#1f0a0a',
        canvasShadow: 'rgba(239, 68, 68, 0.4)',
        paddle: '#38bdf8',
        ball: '#a855f7',
        overlay: '#fca5a5'
      }
    ];

    let score = 0;
    let gameOver = false;
    let running = true;
    let activeTheme = themes[0];
    let customTheme = null;
    let colorBall = null;
    let nextColorBallScore = 15;

    const paddle = {
      w: 80,
      h: 14,
      x: W / 2 - 40,
      y: H - 30,
      speed: 6
    };

    let ballSlots = [];

    const keys = {};

    const bgMusic = new Audio('1.mp3');
    bgMusic.loop = true;
    bgMusic.preload = 'auto';

    const loseSound = new Audio('2.mp3');
    loseSound.preload = 'auto';

    const catchSound = new Audio('3.mp3');
    catchSound.preload = 'auto';

    let musicStarted = false;

    function startBgMusic() {
      if (gameOver) return;
      bgMusic.play().then(() => {
        musicStarted = true;
      }).catch(() => {});
    }

    function stopBgMusic() {
      bgMusic.pause();
      bgMusic.currentTime = 0;
    }

    function playLoseSound() {
      stopBgMusic();
      loseSound.currentTime = 0;
      loseSound.play().catch(() => {});
    }

    function playCatchSound() {
      catchSound.currentTime = 0;
      catchSound.play().catch(() => {});
    }

    function unlockAudio() {
      if (!musicStarted && !gameOver) startBgMusic();
    }

    function applyTheme(theme) {
      activeTheme = typeof theme === 'number' ? themes[theme] : theme;
      document.body.style.background = activeTheme.body;
      titleEl.style.color = activeTheme.title;
      infoEl.style.color = activeTheme.info;
      scoreEl.style.color = activeTheme.scoreAccent;
      hintEl.style.color = activeTheme.hint;
      canvas.style.borderColor = activeTheme.canvasBorder;
      canvas.style.boxShadow = `0 8px 32px ${activeTheme.canvasShadow}`;
    }

    function createThemeFromHue(hue) {
      const accentHue = (hue + 40) % 360;
      const paddleHue = (hue + 180) % 360;
      return {
        body: `linear-gradient(135deg, hsl(${hue}, 45%, 10%) 0%, hsl(${hue}, 40%, 18%) 50%, hsl(${hue}, 50%, 28%) 100%)`,
        title: `hsl(${hue}, 80%, 68%)`,
        info: `hsl(${hue}, 65%, 58%)`,
        scoreAccent: `hsl(${accentHue}, 85%, 65%)`,
        hint: `hsl(${hue}, 55%, 45%)`,
        canvasBorder: `hsl(${hue}, 70%, 50%)`,
        canvasBg: `hsl(${hue}, 35%, 8%)`,
        canvasShadow: `hsla(${hue}, 70%, 50%, 0.4)`,
        paddle: `hsl(${paddleHue}, 70%, 58%)`,
        ball: `hsl(${hue}, 75%, 55%)`,
        overlay: `hsl(${hue}, 80%, 68%)`
      };
    }

    function maybeSpawnColorBall() {
      if (colorBall || score < nextColorBallScore) return;

      const hue = Math.floor(Math.random() * 360);
      colorBall = {
        x: 30 + Math.random() * (W - 60),
        y: -16,
        r: 15,
        speed: 2.8,
        hue,
        color: `hsl(${hue}, 85%, 60%)`
      };
      nextColorBallScore += 15;
    }

    function handleColorBallCatch() {
      playCatchSound();
      customTheme = createThemeFromHue(colorBall.hue);
      applyTheme(customTheme);
      colorBall = null;
    }

    function updateColorBall() {
      if (!colorBall) return;

      colorBall.y += colorBall.speed;

      const caught =
        colorBall.y + colorBall.r >= paddle.y &&
        colorBall.y - colorBall.r <= paddle.y + paddle.h &&
        colorBall.x >= paddle.x &&
        colorBall.x <= paddle.x + paddle.w;

      if (caught) {
        handleColorBallCatch();
        return;
      }

      if (colorBall.y - colorBall.r > H) {
        colorBall = null;
      }
    }

    function getTargetBallCount() {
      return Math.min(MAX_BALLS, 1 + Math.floor(score / POINTS_PER_BALL));
    }

    function getBallSpeed(slotIndex) {
      const baseSpeed = 3 + score * 0.12;

      if (getTargetBallCount() >= 3) {
        return baseSpeed + slotIndex * 0.15;
      }

      return baseSpeed + slotIndex * 0.25;
    }

    function getSpawnStaggerDelay(staggerIndex) {
      return staggerIndex * MIN_ARRIVAL_GAP_MS;
    }

    function countActiveBalls() {
      return ballSlots.filter(ball => ball && !ball.pending).length;
    }

    function createBall(slotIndex) {
      const totalBalls = getTargetBallCount();
      const useLanes = totalBalls >= 2;
      const x = useLanes
        ? BALL_LANES[slotIndex % BALL_LANES.length]
        : 20 + Math.random() * (W - 40);

      return {
        x,
        y: -12,
        r: 12,
        speed: getBallSpeed(slotIndex),
        slotIndex
      };
    }

    function scheduleSpawn(slotIndex, delayMs, maxActiveBalls = Infinity) {
      ballSlots[slotIndex] = {
        pending: true,
        spawnAt: performance.now() + delayMs,
        slotIndex,
        maxActiveBalls
      };
    }

    function activatePendingBalls() {
      const now = performance.now();
      for (let i = 0; i < ballSlots.length; i++) {
        const slot = ballSlots[i];
        if (
          slot &&
          slot.pending &&
          now >= slot.spawnAt &&
          countActiveBalls() <= slot.maxActiveBalls
        ) {
          ballSlots[i] = createBall(slot.slotIndex);
        }
      }
    }

    function updateBallCountUI() {
      const target = getTargetBallCount();
      if (customTheme === null) {
        applyTheme(Math.min(target - 1, themes.length - 1));
      }
      paddle.w = BASE_PADDLE_W + (target - 1) * 18;
      ballCountEl.textContent = target;
    }

    function handleCatch(caughtSlotIndex) {
      const activeBallsBeforeCatch = countActiveBalls();

      playCatchSound();
      score++;
      scoreEl.textContent = score;
      maybeSpawnColorBall();

      const oldTarget = ballSlots.length;
      const newTarget = getTargetBallCount();

      while (ballSlots.length < newTarget) ballSlots.push(null);
      ballSlots.length = newTarget;

      const activeBallsAfterCatch = activeBallsBeforeCatch - 1;
      const caughtBallRespawnDelay =
        activeBallsAfterCatch > 0 ? MIN_ARRIVAL_GAP_MS : 0;
      scheduleSpawn(
        caughtSlotIndex,
        caughtBallRespawnDelay,
        Math.max(0, newTarget - 1)
      );

      let staggerIndex = 1;
      for (let s = oldTarget; s < newTarget; s++) {
        if (s !== caughtSlotIndex) {
          scheduleSpawn(
            s,
            getSpawnStaggerDelay(staggerIndex),
            Math.max(0, newTarget - 1)
          );
          staggerIndex++;
        }
      }

      updateBallCountUI();
    }

    function resetGame() {
      score = 0;
      gameOver = false;
      running = true;
      customTheme = null;
      colorBall = null;
      nextColorBallScore = 15;
      scoreEl.textContent = '0';
      paddle.x = W / 2 - BASE_PADDLE_W / 2;
      paddle.w = BASE_PADDLE_W;
      ballSlots = [createBall(0)];
      applyTheme(0);
      ballCountEl.textContent = '1';
      startBgMusic();
    }

    function drawPaddle() {
      ctx.fillStyle = activeTheme.paddle;
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
      ctx.fill();
    }

    function drawBall(ball) {
      ctx.fillStyle = activeTheme.ball;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(ball.x - 3, ball.y - 3, ball.r / 3, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawColorBall() {
      if (!colorBall) return;

      ctx.save();
      ctx.shadowColor = colorBall.color;
      ctx.shadowBlur = 18;
      ctx.fillStyle = colorBall.color;
      ctx.beginPath();
      ctx.arc(colorBall.x, colorBall.y, colorBall.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.beginPath();
      ctx.arc(colorBall.x - 4, colorBall.y - 4, colorBall.r / 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = activeTheme.overlay;
      ctx.font = 'bold 28px Tahoma';
      ctx.textAlign = 'center';
      ctx.fillText('بازی تمام شد!', W / 2, H / 2 - 20);
      ctx.fillStyle = '#fff';
      ctx.font = '18px Tahoma';
      ctx.fillText('امتیاز: ' + score, W / 2, H / 2 + 7);
      ctx.fillStyle = '#aaa';
      ctx.font = '14px Tahoma';
      ctx.fillText('کلیک، Space یا Enter برای شروع دوباره', W / 2, H / 2 + 50);
    }

    function update() {
      if (!running || gameOver) return;

      activatePendingBalls();
      updateColorBall();

      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        paddle.x = Math.max(0, paddle.x - paddle.speed);
      }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        paddle.x = Math.min(W - paddle.w, paddle.x + paddle.speed);
      }

      for (let i = 0; i < ballSlots.length; i++) {
        const ball = ballSlots[i];
        if (!ball || ball.pending) continue;

        ball.y += ball.speed;

        const caught =
          ball.y + ball.r >= paddle.y &&
          ball.y - ball.r <= paddle.y + paddle.h &&
          ball.x >= paddle.x &&
          ball.x <= paddle.x + paddle.w;

        if (caught) {
          handleCatch(i);
          break;
        }

        if (ball.y - ball.r > H) {
          gameOver = true;
          running = false;
          playLoseSound();
          break;
        }
      }
    }

    function draw() {
      ctx.fillStyle = activeTheme.canvasBg;
      ctx.fillRect(0, 0, W, H);
      drawPaddle();
      for (const slot of ballSlots) {
        if (slot && !slot.pending) drawBall(slot);
      }
      drawColorBall();
      if (gameOver) drawGameOver();
    }

    function tryRestart() {
      if (gameOver) resetGame();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', e => {
      unlockAudio();
      if (gameOver && (e.key === ' ' || e.key === 'Enter')) {
        e.preventDefault();
        tryRestart();
        return;
      }
      keys[e.key] = true;
      if (['ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
    });

    document.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    function movePaddleToClientX(clientX) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const canvasX = (clientX - rect.left) * scaleX;
      paddle.x = Math.max(0, Math.min(W - paddle.w, canvasX - paddle.w / 2));
    }

    canvas.addEventListener('mousemove', e => {
      unlockAudio();
      movePaddleToClientX(e.clientX);
    });

    canvas.addEventListener('click', () => {
      unlockAudio();
      tryRestart();
    });

    function handleTouch(e) {
      unlockAudio();
      if (e.cancelable) e.preventDefault();
      const touch = e.touches[0] || e.changedTouches[0];
      if (touch) movePaddleToClientX(touch.clientX);
    }

    canvas.addEventListener('touchstart', e => {
      handleTouch(e);
      if (gameOver) tryRestart();
    }, { passive: false });

    canvas.addEventListener('touchmove', handleTouch, { passive: false });

    canvas.addEventListener('touchend', e => {
      if (e.cancelable) e.preventDefault();
    }, { passive: false });

    ballSlots = [createBall(0)];
    applyTheme(0);
    startBgMusic();
    loop();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
    }
  </script>
</body>
</html>
